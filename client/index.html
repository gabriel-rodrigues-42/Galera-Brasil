<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="preload"
      href="/fonts/oxanium-latin-variable.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="/fonts/inter-latin-variable.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <title>Galera Brasil — Praça</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <canvas id="scene"></canvas>
      <join-overlay id="overlay"></join-overlay>
      <game-timer-hud id="game-timer" hidden></game-timer-hud>
      <game-quest-guide id="game-quest" hidden></game-quest-guide>
      <game-assembly-overlay id="assembly" hidden></game-assembly-overlay>
      <div id="blackout-vignette"></div>
      <minigame-host id="minigame" hidden></minigame-host>
      <div id="interact-hint" class="hidden"></div>
      <battle-hud id="battle-hud"></battle-hud>
      <post-panel id="post-panel" hidden></post-panel>
      <guestbook-panel id="guestbook-panel" hidden></guestbook-panel>
      <npc-panel id="npc-panel" hidden></npc-panel>
      <chat-box id="chat-box"></chat-box>
      <add-post-panel id="add-post-panel" hidden></add-post-panel>
      <div id="debug-panel" class="collapsed">
        <button
          id="debug-badge"
          type="button"
          title="Atalho: ~ para abrir/fechar · Ctrl+Shift+D para copiar log"
        >
          DEBUG (~)
        </button>
        <div class="debug-title">DEBUG (~ para esconder)</div>
        <pre id="debug-stats"></pre>
        <pre id="debug-log"></pre>
      </div>
      <!-- Game Master Badge and Panel -->
      <gm-badge id="gm-help-badge" hidden></gm-badge>
      <gm-panel id="gm-panel" hidden>
        <gm-builder-tab id="gm-builder-tab" slot="builder"></gm-builder-tab>
        <gm-shortcuts-tab slot="shortcuts"></gm-shortcuts-tab>
        <gm-sound-tab id="gm-sound-tab" slot="sound"></gm-sound-tab>
        <gm-permissions-tab id="gm-permissions-tab" slot="permissions"></gm-permissions-tab>
      </gm-panel>
      <!-- Builder Mode Status Overlay -->
      <builder-status id="builder-status" hidden></builder-status>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
