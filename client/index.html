<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Galera Brasil — Praça</title>
  </head>
  <body>
    <div id="app">
      <canvas id="scene"></canvas>
      <div id="overlay">
        <h1>Galera Brasil</h1>
        <p>Clique para entrar na praça</p>
        <p class="hint">WASD para andar · Mouse para olhar · E para interagir · Esc para sair</p>
      </div>
      <div id="crosshair"></div>
      <div id="interact-hint" class="hidden"></div>
      <div id="post-panel" class="hidden">
        <div id="post-panel-content"></div>
        <p class="panel-hint">Pressione E para fechar</p>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
