<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Galera Brasil — Praça</title>
  </head>
  <body>
    <div id="app">
      <canvas id="scene"></canvas>
      <div id="overlay">
        <h1>Galera Brasil</h1>
        <form id="join-form">
          <input id="name-input" type="text" placeholder="Seu nome" maxlength="24" autocomplete="off" />
          <button type="submit">Entrar</button>
        </form>
        <p id="join-status"></p>
        <div id="resume-block" class="hidden">
          <p>Clique para continuar</p>
        </div>
        <p class="hint">WASD para andar · Mouse para olhar · E para interagir · Enter para conversar · Esc para pausar</p>
      </div>
      <div id="crosshair"></div>
      <div id="interact-hint" class="hidden"></div>
      <div id="post-panel" class="hidden">
        <div id="post-panel-content"></div>
        <p class="panel-hint">Pressione E para fechar</p>
      </div>
      <div id="chat-log"></div>
      <input id="chat-input" class="hidden" type="text" maxlength="200" autocomplete="off" placeholder="Digite sua mensagem — Enter para enviar, Esc para cancelar" />
      <div id="add-post-panel" class="hidden">
        <form id="add-post-form">
          <h2>Novo post</h2>
          <input id="post-title-input" type="text" placeholder="Título" maxlength="60" autocomplete="off" />
          <textarea id="post-body-input" placeholder="Texto do post" maxlength="400" rows="4"></textarea>
          <div class="add-post-actions">
            <button type="submit">Publicar</button>
            <button type="button" id="add-post-cancel">Cancelar</button>
          </div>
          <p class="panel-hint">Esc para cancelar</p>
        </form>
      </div>
      <div id="debug-panel">
        <div class="debug-title">DEBUG (~ para esconder)</div>
        <pre id="debug-stats"></pre>
        <pre id="debug-log"></pre>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
